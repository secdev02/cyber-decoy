#
# Samba configuration for the SMB decoy.
#
# OpenCanary's smb module does NOT implement SMB. It is a log watcher: see
# opencanary/modules/samba.py, which defines SambaLogWatcher(FileSystemWatcher)
# and greps for "smbd_audit" lines. So a real smbd must run here, and its
# full_audit output must reach the file named by "smb.auditfile".
#
# The full_audit:prefix below is NOT cosmetic and must not be reordered.
# samba.py splits each audit line on "|" and reads fixed positions:
#
#   0 %U user        1 %I srcHost      2 %i dstHost     3 %m srcHostName
#   4 %S shareName   5 %L dstHostName  6 %R smbVersion  7 %a smbArch
#   8 %T (unused)    9 %D domainName
#
# full_audit then appends: action | status | path  (positions 10, 11, 12).
# This exact prefix is the one published in the OpenCanary wiki
# ("OpenCanary and Samba"). Changing it silently produces garbled events.

[global]
    workgroup = WORKGROUP
    netbios name = FILESRV01
    server string = Corporate File Server
    server role = standalone
    dns proxy = no

    # Only serve 445. The broker proxies that port; NetBIOS on 139 is not used.
    smb ports = 445

    # Let attackers in without credentials so their access is audited.
    # This is bait, not a real share.
    security = user
    passdb backend = tdbsam
    map to guest = Bad User
    guest account = nobody
    usershare allow guests = yes

    # Keep smbd's own chatter low; the audit stream is what matters.
    log level = 1
    log file = /var/log/samba/log.%m
    max log size = 1000

    # No printing support.
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

    # Audit to syslog facility local7; rsyslog routes local7 to the audit file.
    # full_audit tags its lines "smbd_audit", which is what samba.py matches.
    #
    # "flistxattr" is the operation the OpenCanary wiki specifies for file-open
    # detection; connect/disconnect add share-level events. Valid operation
    # names vary between Samba releases (for example open became openat), so if
    # events stop appearing after a Samba upgrade, this list is the first thing
    # to check. Verify the module is present with: smbd -b | grep full_audit
    vfs objects = full_audit
    full_audit:prefix = %U|%I|%i|%m|%S|%L|%R|%a|%T|%D
    full_audit:success = connect disconnect flistxattr
    full_audit:failure = none
    full_audit:facility = local7
    full_audit:priority = notice

# Bait shares. The names are the lure: they should look worth opening.
[HR-Payroll]
    comment = Human Resources
    path = /srv/share/hr
    browseable = yes
    read only = yes
    guest ok = yes

[Backups]
    comment = Nightly backups
    path = /srv/share/backups
    browseable = yes
    read only = yes
    guest ok = yes
