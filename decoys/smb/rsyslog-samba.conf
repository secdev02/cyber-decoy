# This file REPLACES /etc/rsyslog.conf inside the SMB decoy container.
#
# It is deliberately minimal and self-contained. Debian's stock rsyslog.conf
# loads imklog, which reads kernel logs and is not usable inside a container;
# replacing the whole file avoids that, and avoids double-loading imuxsock.
#
# smb.conf sets "full_audit:facility = local7", so every smbd_audit line arrives
# on local7. OpenCanary tails /var/log/samba-audit.log ("smb.auditfile") and
# matches lines containing "smbd_audit".

# imuxsock provides /dev/log, the socket smbd's syslog() calls write to.
module(load="imuxsock")

$WorkDirectory /var/spool/rsyslog
$FileOwner root
$FileGroup root
$FileCreateMode 0644
$DirCreateMode 0755
$Umask 0022

# Route Samba's audit stream to the file OpenCanary watches, and stop there so
# these lines do not also fan out to the default syslog destinations.
local7.*    /var/log/samba-audit.log
& stop
