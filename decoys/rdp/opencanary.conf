{
    "device.node_id": "decoy-rdp",
    "device.listen_addr": "0.0.0.0",
    "ip.ignorelist": [],
    "logtype.ignorelist": [],

    "rdp.enabled": true,
    "rdp.port": 3389,

    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                }
            }
        }
    }
}
