{
    "device.node_id": "decoy-ssh",
    "device.listen_addr": "0.0.0.0",
    "ip.ignorelist": [],
    "logtype.ignorelist": [],

    "ssh.enabled": true,
    "ssh.port": 2222,
    "ssh.version": "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.1",
    "ssh.key_path": "/var/lib/opencanary/ssh_keys",

    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                }
            }
        }
    }
}
